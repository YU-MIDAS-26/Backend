spring.application.name=YU-MIDAS-Backend

# ===== Server =====
server.port=8080

# ===== Database (MySQL) =====
spring.datasource.url=jdbc:mysql://localhost:3306/yu_midas?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=midas
spring.datasource.password=401040104010
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== JWT =====
jwt.secret=yu-midas-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
jwt.expiration=86400000

# ===== OpenAI (Spring AI) =====
spring.ai.openai.api-key=${OPENAI_API_KEY:your-openai-api-key}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7

# ===== Naver Shopping API =====
naver.client-id=${NAVER_CLIENT_ID:your-naver-client-id}
naver.client-secret=${NAVER_CLIENT_SECRET:your-naver-client-secret}
naver.shopping.search-url=https://openapi.naver.com/v1/search/shop.json

# ===== KAMIS (농산물유통정보) =====
kamis.base-url=https://www.kamis.or.kr/service/price/xml.do
kamis.cert-key=${KAMIS_CERT_KEY:d8438ea0-ea3e-49a5-9da1-a106c784c7c8}
kamis.cert-id=${KAMIS_CERT_ID:7554}
kamis.product-cls-code=02
kamis.country-code=1101
kamis.convert-kg-yn=N
kamis.collect.cron=0 11 9 * * *

# ===== Logging =====
logging.level.com.example.yumidasbackend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
