spring:
  datasource:
    url: jdbc:mysql://localhost:3306/bsight?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: bsight
    password: bsight_2026
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  mail:
    host: ${MAIL_HOST:smtp.zoho.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  application:
    name: spring-server

  profiles:
    active: local

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# ===== KAMIS (농산물유통정보) - 비시크릿 기본값 =====
kamis:
  base-url: https://www.kamis.or.kr/service/price/xml.do
  product-cls-code: "02"
  country-code: "1101"
  convert-kg-yn: "N"
  collect:
    cron: "0 0 9 * * *"

# ===== OpenAI - 비시크릿 (api-key는 application-local.yml) =====
